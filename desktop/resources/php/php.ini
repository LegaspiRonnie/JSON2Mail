; Json2Mail desktop runtime config.
; extension_dir is relative to php.exe so the bundle is location-independent.
extension_dir = "ext"

extension = php_openssl.dll
extension = php_mbstring.dll
extension = php_fileinfo.dll
extension = php_curl.dll
extension = php_pdo_sqlite.dll
extension = php_sqlite3.dll
extension = php_zip.dll

memory_limit = 256M
; The API accepts attachments up to 10 MB; leave headroom for multipart overhead.
upload_max_filesize = 12M
post_max_size = 15M
max_execution_time = 120

; curl/openssl need a CA bundle for TLS (Gmail SMTP); cacert.pem sits next to php.exe.
curl.cainfo = "cacert.pem"
openssl.cafile = "cacert.pem"

display_errors = Off
log_errors = On
