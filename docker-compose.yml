services:
  api:
    build: ./api
    ports:
      - "8000:80"          # host 8000 → container Apache; keeps the SPA's API URL unchanged
    env_file:
      - ./api/.env         # credentials stay on the host, injected at runtime — never baked into the image
    environment:
      APP_ENV: production
      APP_DEBUG: "false"   # why: debug pages leak paths/config; the API's friendly JSON errors take over

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:8000   # from the BROWSER's perspective, not container-to-container
    ports:
      - "5173:80"          # host 5173 → container nginx; matches the CORS allowlist exactly
    depends_on:
      - api